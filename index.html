<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="zvposCLll85KgRs0u8xGTI5ZY_NDqofTCb0J9QTOyVU" />
  <title>Hyuksoon Jang</title>
  <style>
    :root {
      --accent: #0077cc;
      --text-color: #333;
      --bg-color: #f9f9f9;
      --card-bg: #ffffff;
      --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      font-family: var(--font-main);
      color: var(--text-color);
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 30px;
      background: var(--card-bg);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      border-radius: 12px;
    }

    h1 {
      margin-top: 0;
      font-size: 2.5em;
      color: var(--accent);
    }

    .profile-img {
      float: right;
      margin-left: 20px;
      border-radius: 10px;
      width: 180px;
      max-width: 100%;
    }

    .info {
      font-size: 1.1em;
      line-height: 1.6;
    }

    .label {
      font-weight: bold;
    }

    .cv-link a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background-color: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.2s ease-in-out;
    }

    .cv-link a:hover {
      background-color: #005fa3;
    }

    @media (max-width: 600px) {
      .profile-img {
        float: none;
        display: block;
        margin: 0 auto 20px auto;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="hs.jpg" alt="Hyuksoon Jang" class="profile-img" />

    <h1>Hyuksoon Jang</h1>

    <div class="info">
      <p><span class="label">Researcher & Software Engineer</span></p>
      <p><span class="label">Email:</span> hyuksoon (at) postech.ac.kr</p>
      <p><span class="label">Discord:</span> nooskuyh</p>
      <p><span class="label">Research Interests:</span> Formal Methods, Programming Languages, HCI, Numerical Analysis</p>
    </div>

    <div class="cv-link">
      <!-- 변경된 CV 링크 -->
      <a href="Hyuksoon_Jang.pdf"
         target="_blank"
         rel="noopener">
         View CV (PDF, 2&nbsp;MB)
      </a>
    </div>
  </div>

</body>
</html>
